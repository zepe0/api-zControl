<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prueba Endpoint /api/pedidos/upload</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 40px;
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
        text-align: center;
      }
      .subtitle {
        color: #666;
        text-align: center;
        margin-bottom: 30px;
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 25px;
      }
      label {
        display: block;
        color: #333;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
      }
      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
      }
      .file-input-wrapper input[type="file"] {
        position: absolute;
        left: -9999px;
      }
      .file-input-label {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
        border: 2px dashed #667eea;
        border-radius: 8px;
        background: #f8f9ff;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #667eea;
        font-weight: 600;
      }
      .file-input-label:hover {
        background: #f0f2ff;
        border-color: #764ba2;
      }
      .file-name {
        display: none;
        color: #28a745;
        font-size: 14px;
        margin-top: 8px;
      }
      .file-name.active {
        display: block;
      }
      .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .result {
        margin-top: 30px;
        padding: 20px;
        border-radius: 8px;
        display: none;
      }
      .result.success {
        display: block;
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
      }
      .result.error {
        display: block;
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }
      .result-content {
        max-height: 400px;
        overflow-y: auto;
        font-size: 13px;
        line-height: 1.6;
        font-family: "Courier New", monospace;
      }
      .result-title {
        font-weight: 700;
        margin-bottom: 10px;
        font-size: 15px;
      }
      .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .loading .spinner {
        display: block;
      }
      .info-box {
        background: #e7f3ff;
        border-left: 4px solid #2196f3;
        padding: 12px;
        border-radius: 4px;
        font-size: 13px;
        color: #1565c0;
        margin-bottom: 20px;
      }
      .info-box strong {
        display: block;
        margin-bottom: 5px;
      }
      ul {
        margin-left: 20px;
      }
      li {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📤 Prueba de Upload de Pedidos</h1>
      <p class="subtitle">Endpoint: POST /api/pedidos/upload</p>

      <div class="info-box">
        <strong>✅ Archivos soportados:</strong>
        <ul>
          <li>PDF (.pdf)</li>
          <li>Imágenes (JPG, PNG, WEBP)</li>
        </ul>
        <p style="margin-top: 10px">
          El sistema extraerá automáticamente cliente, NIF, teléfono, dirección
          y materiales.
        </p>
      </div>

      <form id="uploadForm">
        <div class="form-group">
          <label for="fileInput">Selecciona un archivo</label>
          <div class="file-input-wrapper">
            <input
              type="file"
              id="fileInput"
              accept=".pdf,.jpg,.jpeg,.png,.webp"
            />
            <label for="fileInput" class="file-input-label">
              📁 Arrastra un archivo aquí o haz clic para seleccionar
            </label>
          </div>
          <div class="file-name" id="fileName"></div>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          Procesar Documento
        </button>
      </form>

      <div id="result" class="result">
        <div class="result-content" id="resultContent"></div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const uploadForm = document.getElementById("uploadForm");
      const resultDiv = document.getElementById("result");
      const resultContent = document.getElementById("resultContent");
      const fileNameDiv = document.getElementById("fileName");
      const submitBtn = document.getElementById("submitBtn");

      // Drag and drop
      fileInput.addEventListener("change", (e) => {
        const fileName = e.target.files[0]?.name;
        if (fileName) {
          fileNameDiv.textContent = `✓ ${fileName}`;
          fileNameDiv.classList.add("active");
        }
      });

      // Form submission
      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!fileInput.files[0]) {
          showError("Por favor, selecciona un archivo");
          return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<div class="loading"><div class="spinner"></div>Procesando...</div>';
        resultDiv.classList.remove("success", "error");

        try {
          const response = await fetch("/api/pedidos/upload", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (response.ok) {
            showSuccess(data);
          } else {
            showError(data);
          }
        } catch (error) {
          showError({
            error: error.message || "Error de conexión con el servidor",
          });
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "Procesar Documento";
        }
      });

      function showSuccess(data) {
        resultDiv.classList.add("success");
        resultDiv.classList.remove("error");
        resultContent.innerHTML = `
                <div class="result-title">✅ ${data.message}</div>
                <pre>${JSON.stringify(data.data, null, 2)}</pre>
            `;
        resultDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function showError(data) {
        resultDiv.classList.add("error");
        resultDiv.classList.remove("success");
        const errorMsg = data.error || "Error desconocido";
        resultContent.innerHTML = `
                <div class="result-title">❌ Error</div>
                <p><strong>${errorMsg}</strong></p>
                ${data.text ? `<p style="margin-top: 10px; color: #666;"><strong>Texto extraído (debugging):</strong></p><pre>${data.text}</pre>` : ""}
                ${data.data ? `<p style="margin-top: 10px; color: #666;"><strong>Datos parcialmente extraídos:</strong></p><pre>${JSON.stringify(data.data, null, 2)}</pre>` : ""}
            `;
        resultDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    </script>
  </body>
</html>
